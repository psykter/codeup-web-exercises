<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,
          user-scalable=no, initial-scale=1.0,
          maximum-scale=1.0, minium-scale=1.0">
    <meta http-equiv="X-UA-Compatible"
          content="ie=edge">
    <title>Layout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/resets.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/layout-exercise.css">

</head>
<body>
    <div class="page-wrapper">
        <header class="container justify-center">
            <div class="row justify-space-between">
                <div class="column shrink">
                    <img src="img/example-logo.svg" alt="Logo">

                </div>
                <nav class="column shrink">
                    <ul class="d-flex gap-5 align-center">
                        <li>
                            <a class="menu-item" href="/">Home</a>
                        </li>
                        <li>
                            <a class="menu-item" href=/overview">Overview</a>
                        </li>
                        <li>
                            <a class="menu-item" href="/features">Features</a>
                        </li>
                        <li>
                            <a href="/sign-up">
                                <button
                                class="btn-primary">Sign Up</button>
                            </a>
                        </li>
                    </ul>
                </nav>

            </div>

        </header>

        <!-- Next Section -->
<body>
        <div class="page-wrapper">
        <section class="container hero justify-center">
            <div class="row">
                <div class="column justify-center">
                    <p class="Subtitle">
                        An Exercise in Web Layouts
                    </p>
                    <h1>We are all masters of the front-end.</h1>
                    <p class="hero-text">
                        Home is behind, the world ahead and there are
                        many paths to tread through .......
                    </p>
                </div>
                <div class="column">
                    <div class="hero-img"></div>
                </div>
            </div>

        </section>
</body>
</html>
