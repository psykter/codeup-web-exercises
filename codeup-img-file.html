<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">

    <style>
        .circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 10px;
            padding: 10px;
        }

        .custom-column {
            margin: 5px; /* Decrease the margin of the columns */
            padding: 5px; /* Decrease the padding of the columns */
        }

        /* Media query for mobile */
        @media (max-width: 576px) {
            .row-cols-2 {
                flex-direction: column;
            }
        }
    </style>
    <title>Circle Example</title>
    <link rel="stylesheet" href="css/desk2mobile-mods.css">
</head>

<body>
<div class="container">
    <div class="row row-cols-2">
        <div class="col custom-column">
            <div class="circle bg-primary text-white">Circle 1</div>
        </div>
        <div class="col custom-column">
            <div class="circle bg-success text-white">Circle 2</div>
        </div>
        <div class="col custom-column">
            <div class="circle bg-danger text-white">Circle 3</div>
        </div>
        <div class="col custom-column">
            <div class="circle bg-warning text-dark">Circle 4</div>
        </div>
    </div>
</div>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</body>

</html>
