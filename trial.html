<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Section with Text and Hero</title>
  <style>
    section {
      display: flex;
      align-items: center;
      padding: 20px;
      background-color: #f2f2f2;
    }

    .text {
      flex: 1;
      padding-right: 20px;
    }

    .hero {
      flex: 1;
    }

    .hero img {
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
<section>
  <div class="text">
    <h2>Title</h2>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed suscipit tortor quis nulla commodo rhoncus.
      Phasellus nec nunc id mauris interdum sollicitudin.</p>
  </div>
  <div class="hero">
    <img src="hero-image.jpg" alt="Hero Image">
  </div>
</section>
</body>

</html>
